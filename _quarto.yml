project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - models.qmd
    - slides.qmd
    - about.qmd
    - docs/SC13-Obs03-CALAMASUR-summary.qmd
    - docs/SC13-SQ06-CHL-SPiCT-summary.qmd
    - docs/SC13-SQ07-CHN-state-space-summary.qmd
    - docs/modelos.qmd
    - "!notes.qmd"
    # Superseded by docs/modelos.qmd (the full working paper). Kept in the repo
    # for reference but excluded from the site.
    - "!docs/SAC-11-risk-analysis-methodology.qmd"
  # The reveal.js deck is committed pre-built (embed-resources makes it a single
  # portable file). It is copied verbatim, not rendered: its sources live outside
  # this repo and rebuilding it needs R + the ICEN data for the live ENSO chunk.
  resources:
    - slides/modelos-slides.html
    - slides/modelos-slides.pdf
    # Typst-rendered working paper, linked from docs/modelos.qmd via
    # format-links. Same file as the Zenodo deposit; not rendered here.
    - docs/modelos.pdf

website:
  title: "Jumbo Flying Squid"
  navbar:
    right:
      - href: index.qmd
        text: Home+
      - href: models.qmd
        text: Models+
      - href: docs/modelos.qmd
        text: Risk+
      - href: slides.qmd
        text: Slides+
      - href: about.qmd
        text: About+

  page-footer:
    border: true
    left: |
      Un proyecto financiado por [CALAMASUR](https://www.calamasur.com){target="_blank"}
    center: Juan-Carlos Quiroz
    right: |
      Apoyado por [Facile Visual](https://www.facilevisual.com){target="_blank"}


format:
  html:
    theme:
      - simplex
      - theme.scss
    css: styles.css
    toc: true
    include-after-body: mermaid-title-fix.html

editor: source

bibliography: references.bib

